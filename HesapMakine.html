<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Makinesi</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#1e1e1e;
    font-family:Arial, sans-serif;
}

.calculator{
    background:#2d2d2d;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    width:320px;
}

#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:28px;
    text-align:right;
    padding-right:10px;
    background:#111;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#444;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.equal{
    background:#28a745;
    color:white;
}

.clear{
    background:#dc3545;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()" rowspan="2">=</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
    </div>
</div>

<script>
function append(value){
    document.getElementById('display').value += value;
}

function clearDisplay(){
    document.getElementById('display').value = '';
}

function calculate(){
    try{
        document.getElementById('display').value =
        eval(document.getElementById('display').value);
    }
    catch{
        document.getElementById('display').value = 'Hata';
    }
}
</script>

</body>
</html>
